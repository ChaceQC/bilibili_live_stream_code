name: Release BiliLiveTool

on:
  push:
    tags:
      - 'v*' # 触发标签：v1.0, v2.0.1 等

jobs:
  update-version:
    name: Update VERSION
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: master

    - name: Write and push VERSION
      run: |
        echo "${{ github.ref_name }}" > VERSION
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add VERSION
        git diff --cached --quiet || git commit -m "chore: update VERSION to ${{ github.ref_name }}"
        git push
      shell: bash

  build:
    name: Build on ${{ matrix.os }}
    needs: update-version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
        include:
          - os: ubuntu-22.04
            asset_name_suffix: linux-amd64
            pyinstaller_options: ""
            icon_ext: "png"
          - os: macos-latest
            asset_name_suffix: macos-amd64
            pyinstaller_options: "--windowed"
            icon_ext: "icns"
          - os: windows-latest
            asset_name_suffix: windows-amd64
            pyinstaller_options: "--noconsole"
            icon_ext: "ico"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: master

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Build Frontend
      run: |
        cd frontend
        npm install
        npm run build
      shell: bash

    - name: Install Backend Dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller Pillow

    - name: Install Linux Dependencies
      if: matrix.os == 'ubuntu-22.04'
      run: |
        sudo apt-get update
        sudo apt-get install -y libnss3 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxrender1 libxtst6 libxcb-glx0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-render0 libxcb-shape0 libxcb-shm0 libxcb-sync1 libxcb-util1 libxcb-xfixes0 libxcb-xinerama0 libxcb1 libxkbcommon-x11-0 libxkbcommon0

    # --- 步骤：自动处理图标 (macOS转icns, Linux转png) ---
    - name: Prepare Platform Icon
      run: |
        if [ "${{ matrix.os }}" == "macos-latest" ]; then
          echo "Converting ICO to ICNS for macOS..."
          sips -s format png bilibili.ico --out temp_icon.png
          mkdir bilibili.iconset
          sips -z 1024 1024 temp_icon.png --out bilibili.iconset/icon_512x512@2x.png
          iconutil -c icns bilibili.iconset
          rm -rf bilibili.iconset temp_icon.png
        elif [ "${{ matrix.os }}" == "ubuntu-22.04" ]; then
          echo "Converting ICO to PNG for Linux..."
          python -c "from PIL import Image; Image.open('bilibili.ico').save('bilibili.png')"
        fi
      shell: bash


    # --- 步骤：(核心) 动态生成 Windows 版本信息 file ---
    - name: Generate Windows Version Info
      if: matrix.os == 'windows-latest'
      run: |
        cat <<EOF > generate_version.py
        import sys
        
        tag = "${{ github.ref_name }}"
        clean_ver = tag.lstrip('v') 
        
        parts = clean_ver.split('.')
        while len(parts) < 4: parts.append('0')
        ver_tuple = tuple(map(int, parts[:4]))
        ver_str = clean_ver
        
        content = f"""
        # UTF-8
        VSVersionInfo(
          ffi=FixedFileInfo(
            filevers={ver_tuple},
            prodvers={ver_tuple},
            mask=0x3f,
            flags=0x0,
            OS=0x40004,
            fileType=0x1,
            subtype=0x0,
            date=(0, 0)
          ),
          kids=[
            StringFileInfo(
              [
                StringTable(
                  u'040904B0',
                  [StringStruct(u'CompanyName', u'BiliLiveTool Open Source'),
                   StringStruct(u'FileDescription', u'BiliLiveTool Client'),
                   StringStruct(u'FileVersion', u'{ver_str}'),
                   StringStruct(u'InternalName', u'BiliLiveTool'),
                   StringStruct(u'LegalCopyright', u'Copyright (c) 2026 Open Source'),
                   StringStruct(u'OriginalFilename', u'BiliLiveTool.exe'),
                   StringStruct(u'ProductName', u'BiliLiveTool'),
                   StringStruct(u'ProductVersion', u'{ver_str}')])
              ]
            ),
            VarFileInfo([VarStruct(u'Translation', [1033, 1200])])
          ]
        )
        """
        
        with open("version_info.txt", "w", encoding="utf-8") as f:
            f.write(content)
            print(f"Generated version_info.txt for version {ver_str}")
        EOF
        
        python generate_version.py
      shell: bash

    - name: Package with PyInstaller
      run: |
        ICON_NAME="bilibili.${{ matrix.icon_ext }}"
        
        EXTRA_ARGS=""
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
           EXTRA_ARGS="--version-file=version_info.txt"
            pyinstaller main.py \
          --name BiliLiveTool \
          --onefile \
          --add-data "frontend/dist:frontend/dist" \
          --add-data "bilibili.ico;." \
          --add-data "VERSION;." \
          --icon "$ICON_NAME" \
          $EXTRA_ARGS \
          ${{ matrix.pyinstaller_options }}
        elif [ "${{ matrix.os }}" == "ubuntu-22.04" ]; then
           pyinstaller main.py --name BiliLiveTool --onefile \
            --add-data "frontend/dist:frontend/dist" \
            --add-data "bilibili.ico:." \
            --add-data "VERSION:." \
            --hidden-import _cffi_backend \
            --hidden-import cffi \
            --hidden-import qtpy \
            --hidden-import PyQt5 \
            --hidden-import webview.platforms.qt
        elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            pyinstaller main.py \
              --name BiliLiveTool \
              --onefile \
              --add-data "frontend/dist:frontend/dist" \
              --add-data "bilibili.ico:." \
              --add-data "VERSION:." \
              --icon "$ICON_NAME" \
              --hidden-import _cffi_backend \
              $EXTRA_ARGS \
              ${{ matrix.pyinstaller_options }}
        fi

      shell: bash

    - name: Prepare Artifacts
      run: |
        VERSION="${{ github.ref_name }}"
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          EXE_NAME="BiliLiveTool.exe"
          ASSET_NAME="BiliLiveTool-${VERSION}-${{ matrix.asset_name_suffix }}.zip"
          mv dist/$EXE_NAME .
          7z a $ASSET_NAME $EXE_NAME
        elif [ "${{ matrix.os }}" == "macos-latest" ]; then
          APP_NAME="BiliLiveTool.app"
          ASSET_NAME="BiliLiveTool-${VERSION}-${{ matrix.asset_name_suffix }}.zip"
          7z a -r $ASSET_NAME dist/$APP_NAME
        else # Linux
          ASSET_NAME="BiliLiveTool-${VERSION}-${{ matrix.asset_name_suffix }}.tar.gz"
          tar -czvf $ASSET_NAME -C dist BiliLiveTool
        fi
        echo "ASSET_NAME=${ASSET_NAME}" >> $GITHUB_ENV
      shell: bash

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BiliLiveTool-${{ github.ref_name }}-${{ matrix.asset_name_suffix }}
        path: ${{ env.ASSET_NAME }}

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 必须拉取所有历史记录以便对比 tag

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Get Raw Git Changelog
      id: raw_changelog
      run: |
        # 获取上次的 tag
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        
        if [ -z "$PREVIOUS_TAG" ]; then
          LOGS=$(git log --no-merges --pretty=format:"- %s" | grep -v "chore: update VERSION")
        else
          LOGS=$(git log --no-merges --pretty=format:"- %s" $PREVIOUS_TAG..HEAD | grep -v "chore: update VERSION")
        fi
        
        # 将原始日志写入环境变量
        echo "RAW_CHANGELOG<<EOF" >> $GITHUB_ENV
        echo "$LOGS" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV
      shell: bash

    - name: Summarize Changelog with DeepSeek
      id: ai_summary
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: |
        # 使用内置的 python3 发送请求给 DeepSeek
        python3 -c "
        import os, json, urllib.request
        
        api_key = os.environ.get('DEEPSEEK_API_KEY')
        raw_log = os.environ.get('RAW_CHANGELOG', '').strip()
        env_file = os.environ.get('GITHUB_ENV')
        
        def write_env(content):
            with open(env_file, 'a', encoding='utf-8') as f:
                f.write('AI_CHANGELOG<<EOF\n')
                f.write(content + '\n')
                f.write('EOF\n')
        
        if not api_key or not raw_log:
            print('Missing API Key or empty changelog. Using raw logs.')
            write_env(raw_log if raw_log else 'No changes detected.')
            exit(0)
            
        prompt = f'''请作为一名专业的产品经理，将以下原始的 git commit 日志总结为一份面向普通用户的版本更新说明 (Release Notes)。
        要求：
        1. 忽略纯代码格式化、错别字修改或无意义的琐碎提交。
        2. 将更新内容分类，例如使用：'✨ 新特性', '🐛 问题修复', '🔧 体验优化' 等标题。
        3. 语气要友好、专业，排版使用 Markdown 格式。
        4. 直接输出总结内容，不要包含多余的寒暄语。
        
        原始日志如下：\n{raw_log}'''
        
        url = 'https://api.deepseek.com/chat/completions'
        headers = {
            'Content-Type': 'application/json',
            'Authorization': f'Bearer {api_key}'
        }
        data = {
            'model': 'deepseek-v4-flash',
            'messages': [{'role': 'user', 'content': prompt}],
            'temperature': 0.3
        }
        
        req = urllib.request.Request(url, data=json.dumps(data).encode('utf-8'), headers=headers, method='POST')
        try:
            with urllib.request.urlopen(req) as response:
                result = json.loads(response.read().decode('utf-8'))
                ai_reply = result['choices'][0]['message']['content']
                print('Successfully generated AI summary.')
                write_env(ai_reply)
        except Exception as e:
            print(f'Failed to call DeepSeek API: {e}')
            print('Falling back to raw logs.')
            write_env(raw_log)
        "
      shell: bash

    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/*/*
        body: |
          ## 🚀 BiliLiveTool ${{ github.ref_name }} 发布
          
          ${{ env.AI_CHANGELOG }}
          
          ---
          
          ### 📦 下载地址
          请根据您的系统选择对应的版本进行下载：
          - **Windows**: 下载 `.zip` 解压即用
          - **macOS**: 下载 `.zip` 解压运行
          - **Linux**: 下载 `.tar.gz` 解压使用

          ### 🛡️ Windows 用户安全提示
          如果您在 Windows 上运行遇到 **"Windows 已保护你的电脑"** (SmartScreen) 蓝框提示：
          1. 点击 **"更多信息" (More Info)**
          2. 点击 **"仍要运行" (Run Anyway)**
          
          > 💡 这是因为开源软件通常未购买数字签名证书，属于正常拦截现象，请放心使用。

        draft: false
        prerelease: false
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}